services:
  api:
    build: ./app
    container_name: femquest-orchestrator-api
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: femquest-orchestrator-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config: