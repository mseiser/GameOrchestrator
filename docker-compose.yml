version: '3.8'

services:
  game-orchestrator:
    build: .
    image: game-orchestrator:latest
    container_name: game-orchestrator
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/app/certs
      - ./db_data:/app/db_data
    environment:
      - DB_PATH=/app/db_data/femquest.db
      - SSL_CERTFILE=/app/certs/server.crt
      - SSL_KEYFILE=/app/certs/server.key
      - INTERNAL_HMAC_KEY=${INTERNAL_HMAC_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SNAPSHOT_ID=${SNAPSHOT_ID}
      - DROPLET_TAG=${DROPLET_TAG}
      - DROPLET_REGION=${DROPLET_REGION}
      - DROPLET_SIZE=${DROPLET_SIZE}
      - DIGITALOCEAN_TOKEN=${DIGITALOCEAN_TOKEN}
    restart: unless-stopped
